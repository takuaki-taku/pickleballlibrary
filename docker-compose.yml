services:
  db:
    image: mysql:8.0
    container_name: pickleball_db
    restart: always
    environment:
      MYSQL_DATABASE: pickleball_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    container_name: pickleball_web
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_TYPE=mysql
      - DB_NAME=pickleball_db
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_PORT=3306
      - SECRET_KEY=django-insecure-dev-key
    depends_on:
      - db

volumes:
  mysql_data:
